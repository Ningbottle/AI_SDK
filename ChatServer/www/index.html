<!doctype html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>AI 聊天助手</title>
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css"
        />
        <link rel="stylesheet" href="css/style.css?v=6" />
    </head>
    <body>
        <div class="app-container">
            <!-- ============ Header ============ -->
            <header class="header">
                <div class="header-logo">
                    <svg
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="1.5"
                    >
                        <path
                            d="M12 2a10 10 0 0110 10c0 3.5-2.8 6.4-6.2 6.8l-1.5 2.5a.5.5 0 01-.86 0l-1.5-2.5A10 10 0 0112 2z"
                            stroke="var(--accent)"
                        />
                        <path
                            d="M9 11.5l2 2 4-4"
                            stroke="var(--accent)"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                        />
                    </svg>
                    <span class="header-title">AI 聊天助手</span>
                </div>
                <div class="header-actions">
                    <button
                        class="btn btn-ghost sidebar-toggle"
                        id="sidebarToggle"
                        title="切换侧边栏"
                    >
                        <svg
                            width="18"
                            height="18"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2"
                        >
                            <line x1="3" y1="6" x2="21" y2="6" />
                            <line x1="3" y1="12" x2="21" y2="12" />
                            <line x1="3" y1="18" x2="21" y2="18" />
                        </svg>
                    </button>
                    <button class="btn btn-primary" id="newChatBtn">
                        <svg
                            width="14"
                            height="14"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2"
                        >
                            <line x1="12" y1="5" x2="12" y2="19" />
                            <line x1="5" y1="12" x2="19" y2="12" />
                        </svg>
                        <span>新建对话</span>
                    </button>
                </div>
            </header>

            <!-- ============ Main Content ============ -->
            <div class="main-content">
                <!-- -------- Sidebar -------- -->
                <aside class="sidebar">
                    <div class="sidebar-header">
                        <span class="sidebar-title">历史对话</span>
                    </div>
                    <div class="session-list" id="sessionList">
                        <!-- 由 JavaScript 动态渲染 -->
                    </div>
                </aside>

                <!-- -------- Chat Area -------- -->
                <div class="chat-area" id="chatArea">
                    <!-- Welcome Screen -->
                    <div class="welcome" id="welcomeScreen">
                        <div class="welcome-icon">
                            <svg
                                viewBox="0 0 24 24"
                                fill="none"
                                stroke="currentColor"
                                stroke-width="1"
                            >
                                <path
                                    d="M12 2a10 10 0 0110 10c0 3.5-2.8 6.4-6.2 6.8l-1.5 2.5a.5.5 0 01-.86 0l-1.5-2.5A10 10 0 0112 2z"
                                    stroke="var(--accent)"
                                    opacity="0.6"
                                />
                            </svg>
                        </div>
                        <p class="welcome-title">
                            选择一个历史对话继续，<br />或创建新的对话，开启您的
                            AI 之旅
                        </p>
                        <button class="btn btn-primary" id="welcomeNewBtn">
                            <svg
                                width="14"
                                height="14"
                                viewBox="0 0 24 24"
                                fill="none"
                                stroke="currentColor"
                                stroke-width="2"
                            >
                                <line x1="12" y1="5" x2="12" y2="19" />
                                <line x1="5" y1="12" x2="19" y2="12" />
                            </svg>
                            <span>新建对话</span>
                        </button>
                    </div>

                    <!-- Chat View (hidden by default) -->
                    <div
                        class="messages-container"
                        id="messagesContainer"
                        style="display: none"
                    ></div>

                    <!-- Input Area (hidden by default) -->
                    <div
                        class="input-area"
                        id="inputArea"
                        style="display: none"
                    >
                        <div class="input-wrapper">
                            <textarea
                                id="messageInput"
                                rows="1"
                                placeholder="请输入您的消息...(Enter 发送，Shift+Enter 换行)"
                                maxlength="2000"
                            ></textarea>
                            <div class="input-actions">
                                <button class="send-btn" id="sendBtn" disabled>
                                    <svg
                                        width="16"
                                        height="16"
                                        viewBox="0 0 24 24"
                                        fill="none"
                                        stroke="currentColor"
                                        stroke-width="2"
                                    >
                                        <line x1="22" y1="2" x2="11" y2="13" />
                                        <polygon
                                            points="22 2 15 22 11 13 2 9 22 2"
                                        />
                                    </svg>
                                </button>
                                <span class="word-count" id="wordCount"
                                    >0/2000</span
                                >
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- ============ Model Selection Modal ============ -->
        <div class="modal-overlay" id="modelModal">
            <div class="modal">
                <div class="modal-title">选择模型</div>
                <div class="model-grid" id="modelGrid">
                    <!-- 由 JavaScript 动态渲染 -->
                </div>
                <div class="modal-actions">
                    <button class="btn btn-cancel" id="modalCancelBtn">
                        取消
                    </button>
                    <button class="btn btn-primary" id="modalConfirmBtn">
                        确定
                    </button>
                </div>
            </div>
        </div>

        <!-- ============ Delete Confirm ============ -->
        <div class="confirm-overlay" id="confirmOverlay">
            <div class="confirm-box">
                <div class="confirm-text">确定删除此会话？删除后不可恢复。</div>
                <div class="confirm-actions">
                    <button class="btn btn-cancel" id="confirmCancelBtn">
                        取消
                    </button>
                    <button
                        class="btn btn-primary"
                        style="background: var(--danger)"
                        id="confirmDeleteBtn"
                    >
                        删除
                    </button>
                </div>
            </div>
        </div>

        <!-- ============ Libraries ============ -->
        <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
        <script src="js/app.js?v=7"></script>
    </body>
</html>
