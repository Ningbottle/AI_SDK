# AIChatServer 配置文件
# 使用方式: ./AIChatServer --flagfile=ChatServer.conf
#
# 每行一个参数，格式: --参数名=值
# 命令行传入的参数会覆盖配置文件中的值

# --- 服务器基础参数 ---
--host=0.0.0.0
--port=8080

# --- 日志级别 ---
# 可选: TRACE / DEBUG / INFO / WARN / ERROR / CRITICAL
--log_level=INFO

# --- 模型通用参数 ---
--temperature=0.7
--max_tokens=2048

# --- Ollama 本地模型（可选） ---
# 如果不需要 Ollama，注释掉或留空下面三行
# --ollama_end_point=http://localhost:11434
# --ollama_module_name=llama3.2
# --ollama_module_desc=Local LLM via Ollama
